name: Daily Issue Analysis

on:
  # 매일 09:00 KST (= UTC 00:00)
  schedule:
    - cron: '0 0 * * *'

  # 수동 실행
  workflow_dispatch:
    inputs:
      analysis_date:
        description: '분석 날짜 YYYY-MM-DD (비워두면 어제)'
        required: false
        default: ''

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily analysis
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DC_PICKAXE_MASTER_SHEET_URL: ${{ secrets.DC_PICKAXE_MASTER_SHEET_URL }}
          ANALYTICS_SPREADSHEET_ID:   ${{ secrets.ANALYTICS_SPREADSHEET_ID }}
          GEMINI_API_KEY:              ${{ secrets.GEMINI_API_KEY }}
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.analysis_date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.analysis_date }}"
          fi
          python run_daily.py $DATE_ARG
